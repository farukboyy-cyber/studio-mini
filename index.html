<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>UMF Studio</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

html {
    scroll-behavior: smooth;
}

body {
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
}

/* NAVBAR */
nav {
    position: fixed;
    width: 100%;
    top: 0;
    background: rgba(0,0,0,0.4);
    backdrop-filter: blur(12px);
    z-index: 1000;
}

.nav-container {
    max-width: 1100px;
    margin: auto;
    display: flex;
    justify-content: space-between;
    padding: 15px 20px;
}

.nav-links a {
    color: #aaa;
    margin-left: 20px;
    text-decoration: none;
    transition: 0.3s;
}

.nav-links a:hover {
    color: white;
}

/* HERO */
.hero {
    height: 100vh;
    background: url('foto1.jpg.jpeg') center/cover no-repeat;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    position: relative;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: linear-gradient(to bottom, rgba(0,0,0,0.7), #000);
}

.hero-content {
    position: relative;
    z-index: 2;
}

.hero h1 {
    font-size: 60px;
    letter-spacing: 2px;
}

.hero p {
    color: #bbb;
    margin-top: 10px;
}

/* BUTTON */
.btn {
    display: inline-block;
    margin-top: 25px;
    padding: 14px 28px;
    border-radius: 50px;
    background: linear-gradient(135deg, #25D366, #00ffcc);
    color: black;
    font-weight: bold;
    text-decoration: none;
    transition: 0.3s;
}

.btn:hover {
    transform: scale(1.08);
    box-shadow: 0 0 25px #25D366;
}

/* SECTION */
section {
    padding: 100px 20px;
}

.container {
    max-width: 1100px;
    margin: auto;
}

h2 {
    text-align: center;
    margin-bottom: 40px;
    font-size: 28px;
}

/* GLASS CARD */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(15px);
    border-radius: 20px;
    padding: 25px;
}

/* GALERI */
.galeri {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 20px;
}

.galeri img {
    width: 100%;
    height: 230px;
    object-fit: cover;
    border-radius: 15px;
    transition: 0.4s;
}

.galeri img:hover {
    transform: scale(1.07);
}

/* PAKET */
.paket-container {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
}

.paket {
    text-align: center;
    transition: 0.3s;
}

.paket:hover {
    transform: translateY(-10px);
    box-shadow: 0 10px 30px rgba(0,255,200,0.2);
}

/* SOSMED */
.sosmed {
    display: flex;
    justify-content: center;
    gap: 20px;
    flex-wrap: wrap;
}

.sosmed-item {
    padding: 14px 22px;
    border-radius: 50px;
    background: rgba(255,255,255,0.05);
    display: flex;
    align-items: center;
    gap: 10px;
    transition: 0.3s;
    text-decoration: none;
    color: white;
}

.sosmed-item:hover {
    transform: scale(1.08);
}

.whatsapp:hover { background: #25D366; }
.instagram:hover { background: #E1306C; }
.tiktok:hover { background: black; }

/* FLOAT WA */
.wa-float {
    position: fixed;
    bottom: 25px;
    right: 25px;
    background: #25D366;
    padding: 18px;
    border-radius: 50%;
    font-size: 22px;
    color: white;
    box-shadow: 0 0 20px #25D366;
}

/* FOOTER */
footer {
    text-align: center;
    padding: 30px;
    color: #666;
}
</style>
</head>
